[project]
name = "fae-demo"
version = "0.1.0"
description = "家庭宽带网络仿真器 - 直播卡顿率仿真与闭环措施评估"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24",
    "pyyaml>=6.0",
    "typer>=0.9",
    "rich>=13.0",
    "matplotlib>=3.7",
]

[project.optional-dependencies]
web = ["streamlit>=1.28"]
dev = ["pytest>=7.0", "pytest-cov>=4.0"]

[project.scripts]
fae-sim = "src.cli:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
