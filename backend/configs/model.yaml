provider: openrouter     # openai | openai_like | openrouter
base_url: https://openrouter.ai/api/v1
# API Key: 直接填写 api_key，或通过 api_key_env 指定环境变量名
api_key: ""              # 直接配置 API Key（优先级高于 api_key_env）
api_key_env: OPENROUTER_API_KEY  # 备选：从环境变量读取
model: qwen/qwen3.5-27b
temperature: 0.3
max_tokens: 4096
timeout: 60

# 角色映射（可选）— 用于不支持 developer 角色的 OpenAI 兼容 API（如 Qwen、DeepSeek 等）
# 取消注释以下内容即可将 system 角色保持为 system（而非 OpenAI 新规的 developer）
role_map:
  system: system
  user: user
  assistant: assistant
  tool: tool

# ──────────────────────────────────────────────────────────────────────────────
# 网络 / SSL 相关（可选）— 企业内网 TLS 拦截 / 自签证书 / 代理场景使用
#
# 任一字段设置后，model_loader 会构造自定义 httpx.AsyncClient 传给 agno Model；
# 全部省略（默认）时行为不变，走 agno 默认 client。
#
# 诊断参考：如果本地 `requests.post(..., verify=False)` 能通但 agno 报
# `Connection error.`，几乎都是 SSL 验证失败或代理未透传 —— 用下面的 verify_ssl
# 或 ca_bundle 修复。
# ──────────────────────────────────────────────────────────────────────────────

# verify_ssl: false          # 禁用 SSL 证书验证（仅限企业内网 / POC；生产环境请用 ca_bundle）
# ca_bundle: /etc/ssl/certs/company-ca.pem   # 指向自定义 CA 证书文件（推荐，比禁用 SSL 更安全）
# proxy: http://user:pass@proxy.company.com:8080   # 显式 HTTP/HTTPS 代理（留空则尊重环境变量 HTTPS_PROXY）
# trust_env: true            # 是否读取环境变量里的 HTTPS_PROXY / NO_PROXY 等（默认 true）
